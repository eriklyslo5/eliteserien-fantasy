name: Import Team

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Your team ID from fantasy.tv2.no'
        required: true

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch team picks
        run: node scripts/fetch-team.mjs "${{ github.event.inputs.team_id }}"

      - name: Commit team data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/my-team.json
          git diff --staged --quiet && echo "No changes." && exit 0
          git commit -m "chore: import team"
          git push
